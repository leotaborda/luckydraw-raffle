<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Página não encontrada | LuckyDraw</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="./public/favicon.ico" sizes="any" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      /* ── Tokens ── */
      :root {
        --bg: #09090f;
        --surface: #111119;
        --surface-hi: #19192a;
        --border: rgba(255, 255, 255, 0.07);
        --border-md: rgba(255, 255, 255, 0.13);
        --border-ac: rgba(110, 231, 183, 0.22);
        --text: #ececf4;
        --text-soft: #9898b8;
        --ac: #6ee7b7;
        --ac-hi: #a7f3d0;
        --ac-lo: #34d399;
        --ac-dim: rgba(110, 231, 183, 0.09);
        --ac-glow: rgba(110, 231, 183, 0.22);
        --danger: #f87171;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.65);
        --shadow-ac: 0 4px 32px rgba(110, 231, 183, 0.22);
        --r-xl: 22px;
        --r-lg: 12px;
        --r-pill: 999px;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
        --mono: "Space Mono", monospace;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        color-scheme: dark;
      }

      :root[data-theme="light"] {
        --bg: #f5f4f0;
        --surface: #ffffff;
        --surface-hi: #f9f8f5;
        --border: rgba(0, 0, 0, 0.07);
        --border-md: rgba(0, 0, 0, 0.13);
        --border-ac: rgba(5, 150, 105, 0.24);
        --text: #1a1a24;
        --text-soft: #6b6b80;
        --ac: #059669;
        --ac-hi: #047857;
        --ac-lo: #10b981;
        --ac-dim: rgba(5, 150, 105, 0.07);
        --ac-glow: rgba(5, 150, 105, 0.14);
        --danger: #dc2626;
        --shadow: 0 6px 24px rgba(0, 0, 0, 0.09);
        --shadow-ac: 0 4px 24px rgba(5, 150, 105, 0.18);
        color-scheme: light;
      }

      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      html, body { min-height: 100dvh; }

      body {
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }

      /* ── Background canvas ── */
      #bgCanvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Shell ── */
      .shell {
        position: relative;
        z-index: 1;
        width: min(1000px, calc(100% - 48px));
        margin-inline: auto;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* ── Nav ── */
      .topnav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 0 20px;
        border-bottom: 1px solid var(--border);
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
      }
      .brand-icon {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
      }
      .brand-icon img { transition: transform 0.3s var(--ease); }
      .brand-icon img:hover { transform: rotate(-15deg) scale(1.12); }
      .brand-name {
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text);
      }
      .brand-logo {
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--ac);
      }

      /* ── Error stage ── */
      .error-stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px 0 80px;
        gap: 0;
      }

      /* Ticket card */
      .ticket {
        position: relative;
        background: var(--surface);
        border: 1px solid var(--border-md);
        border-radius: var(--r-xl);
        padding: 52px 56px 44px;
        max-width: 500px;
        width: 100%;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      /* Torn edge top */
      .ticket::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: repeating-linear-gradient(
          90deg,
          var(--ac) 0px,
          var(--ac) 18px,
          transparent 18px,
          transparent 28px
        );
        opacity: 0.6;
      }

      /* Glow blob */
      .ticket::after {
        content: "";
        position: absolute;
        top: -80px; left: 50%;
        transform: translateX(-50%);
        width: 340px;
        height: 240px;
        background: radial-gradient(ellipse, var(--ac-glow) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .ticket > * { position: relative; z-index: 1; }

      /* Code number */
      .error-code {
        font-family: var(--mono);
        font-size: clamp(5rem, 18vw, 7.5rem);
        font-weight: 700;
        line-height: 1;
        color: var(--ac);
        letter-spacing: -0.04em;
        text-shadow: 0 0 60px var(--ac-glow);
        animation: pulse-glow 3s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%, 100% { text-shadow: 0 0 40px var(--ac-glow); }
        50%       { text-shadow: 0 0 80px var(--ac-glow), 0 0 20px var(--ac); }
      }

      /* Divider dashes */
      .ticket-divider {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 20px 0;
      }
      .ticket-divider span {
        flex: 1;
        height: 1px;
        background: var(--border-md);
      }
      .ticket-divider i {
        color: var(--ac);
        font-size: 1rem;
        animation: spin-slow 6s linear infinite;
      }
      @keyframes spin-slow {
        to { transform: rotate(360deg); }
      }

      /* Text */
      .error-title {
        font-size: clamp(1.1rem, 4vw, 1.35rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--text);
        margin-bottom: 10px;
      }
      .error-desc {
        font-size: 0.92rem;
        color: var(--text-soft);
        line-height: 1.6;
        margin-bottom: 32px;
      }

      /* Buttons */
      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 22px;
        background: var(--ac);
        color: #09090f;
        font-weight: 700;
        font-size: 0.9rem;
        border: none;
        border-radius: var(--r-pill);
        cursor: pointer;
        text-decoration: none;
        transition: background 0.18s var(--ease), transform 0.18s var(--ease), box-shadow 0.18s var(--ease);
        box-shadow: var(--shadow-ac);
      }
      .btn-primary:hover {
        background: var(--ac-hi);
        transform: translateY(-2px);
        box-shadow: 0 8px 28px var(--ac-glow);
      }
      .btn-primary:active { transform: translateY(0); }

      .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 20px;
        background: transparent;
        color: var(--text-soft);
        font-weight: 600;
        font-size: 0.9rem;
        border: 1px solid var(--border-md);
        border-radius: var(--r-pill);
        cursor: pointer;
        text-decoration: none;
        transition: border-color 0.18s, color 0.18s, transform 0.18s var(--ease);
      }
      .btn-ghost:hover {
        border-color: var(--ac);
        color: var(--ac);
        transform: translateY(-2px);
      }

      /* Ticket stub at bottom */
      .ticket-stub {
        margin-top: 24px;
        padding-top: 18px;
        border-top: 1px dashed var(--border-md);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text-soft);
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .ticket-stub i { color: var(--ac); font-size: 0.82rem; }

      /* ── Footer ── */
      .error-footer {
        padding: 20px 0 32px;
        text-align: center;
        color: var(--text-soft);
        font-size: 0.8rem;
        border-top: 1px solid var(--border);
      }
      .error-footer a {
        color: var(--ac);
        text-decoration: none;
      }
      .error-footer a:hover { text-decoration: underline; }
    </style>
  </head>

  <body>
    <canvas id="bgCanvas" aria-hidden="true"></canvas>

    <div class="shell">
      <nav class="topnav">
        <a class="nav-brand" href="./">
          <div class="brand-icon">
            <img src="./public/favicon.ico" width="28" height="28" alt="" />
          </div>
          <span class="brand-name">Sorteador</span>
          <span class="brand-logo">LuckyDraw</span>
        </a>
      </nav>

      <main class="error-stage">
        <div class="ticket" role="main">
          <p class="error-code" aria-label="Erro 404">404</p>

          <div class="ticket-divider" aria-hidden="true">
            <span></span>
            <i class="bi bi-arrow-repeat"></i>
            <span></span>
          </div>

          <h1 class="error-title">Essa página não foi sorteada</h1>
          <p class="error-desc">
            Parece que a URL que você buscou não existe ou foi removida.<br />
            Mas a sorte ainda está do seu lado — volte e faça um novo sorteio!
          </p>

          <div class="btn-group">
            <a href="./" class="btn-primary">
              <i class="bi bi-house-fill"></i>
              Ir para o início
            </a>
            <button class="btn-ghost" onclick="history.back()">
              <i class="bi bi-arrow-left"></i>
              Voltar
            </button>
          </div>

          <div class="ticket-stub" aria-hidden="true">
            <i class="bi bi-ticket-perforated-fill"></i>
            <span>LuckyDraw · Erro 404</span>
          </div>
        </div>
      </main>

      <footer class="error-footer">
        <a href="./">LuckyDraw</a> — Sorteador Online Grátis
      </footer>
    </div>

    <script>
      // Animated background (same as main app)
      (function () {
        const canvas = document.getElementById("bgCanvas");
        const ctx = canvas.getContext("2d");
        const isDark = () => document.documentElement.dataset.theme !== "light";

        let W, H, particles = [];

        function resize() {
          W = canvas.width = window.innerWidth;
          H = canvas.height = window.innerHeight;
        }

        function randomParticle() {
          return {
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.4,
            dx: (Math.random() - 0.5) * 0.18,
            dy: (Math.random() - 0.5) * 0.18,
            o: Math.random() * 0.45 + 0.08,
          };
        }

        function init() {
          resize();
          particles = Array.from({ length: 70 }, randomParticle);
        }

        function draw() {
          ctx.clearRect(0, 0, W, H);
          const color = isDark() ? "110,231,183" : "5,150,105";
          particles.forEach((p) => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${color},${p.o})`;
            ctx.fill();
            p.x += p.dx;
            p.y += p.dy;
            if (p.x < 0 || p.x > W) p.dx *= -1;
            if (p.y < 0 || p.y > H) p.dy *= -1;
          });
          requestAnimationFrame(draw);
        }

        window.addEventListener("resize", resize);
        init();
        draw();
      })();
    </script>
  </body>
</html>
